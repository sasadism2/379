<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexusVibe Cloud | API Infrastructure & Edge Network</title>
  <style>
    :root {
      --bg: #0b0f19;
      --surface: #151b2c;
      --primary: #3b82f6;
      --text: #f3f4f6;
      --muted: #9ca3af;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
    }
    .container {
      max-width: 600px;
      padding: 2.5rem;
      background: var(--surface);
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .logo {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.05em;
      color: #ffffff;
      margin-bottom: 0.5rem;
    }
    .logo span {
      color: var(--primary);
    }
    .badge {
      display: inline-block;
      background: rgba(59, 130, 246, 0.1);
      color: var(--primary);
      padding: 0.35rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }
    p {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .status-box {
      background: rgba(0, 0, 0, 0.2);
      padding: 1rem;
      border-radius: 8px;
      font-family: monospace;
      font-size: 0.85rem;
      color: #34d399;
      border-left: 4px solid #10b981;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="logo">Nexus<span>Vibe</span></div>
    <div class="badge">Edge Network Active</div>
    <h1>API Gateway Instance Operational</h1>
    <p>This edge cluster node is successfully deployed and running on our globally distributed proxy network. Incoming microservice hooks and environment sync routines are being automatically processed.</p>
    <div class="status-box">
      ⚡ Status: 200 OK | Node: Edge-US-West
    </div>
  </div>

</body>
</html>
